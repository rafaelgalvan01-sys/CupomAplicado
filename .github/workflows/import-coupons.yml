name: Importar cupons

on:
  schedule:
    # A cada 3 horas (8x/dia): 00h, 03h, 06h, 09h, 12h, 15h, 18h, 21h no horário de Brasília
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm ci

      - name: Importar cupons da Lomadee
        env:
          LOMADEE_API_KEY: ${{ secrets.LOMADEE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/import-lomadee.mjs

      - name: Importar cupons da Awin
        # Roda mesmo se a Lomadee falhar acima — fontes de importação são
        # independentes, uma fora do ar não pode travar as outras. O job
        # como um todo continua reportando falha se algum passo falhar,
        # então o alerta por e-mail do GitHub Actions não se perde.
        if: always()
        env:
          AWIN_API_TOKEN: ${{ secrets.AWIN_API_TOKEN }}
          AWIN_PUBLISHER_ID: ${{ secrets.AWIN_PUBLISHER_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/import-awin.mjs
